#include
include themes/Matugen.conf

font_family	JetBrainsMomo Nerd Font Mono
font_size	12

disable_ligatures no
enable_audio_bell no

#shell zsh
shell fish
shell_integration disabled

cursor_shape block

url_style curly

remember_window_size no

initial_window_width 78c
initial_window_height 23c
window_padding_width 10
cursor_blink_interval 0
hide_window_decorations      yes
background_opacity 0.8
scrollbar_handle_opacity 0
scrollbar_track_opacity 0
scrollbar_track_hover_opacity 0
confirm_os_window_close 0

# Performance setting 
sync_to_monitor no

repaint_delay 8
input_delay 3

cursor_trail 3




# BEGIN_KITTY_THEME
# Matugen
include current-theme.conf
# END_KITTY_THEME
