source = ~/.config/hypr/colors.conf

$text_color = $primary
$entry_background_color = $surface_alpha
$entry_border_color = $tertiary
$entry_color = $on_surface
$font_color = $surface
$error_color = $error
$font_family = GeistMono Nerd Font
$font_family_clock = IosevkaTerm Nerd Font
$font_symbols = GeistMono Nerd Font Propo


background {
    monitor =
    path = $image
    blur_passes = 2
    contrast = 1
    brightness = 0.7
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2 
    dots_spacing = 0.35 
    dots_center = true  
    inner_color = $text_color
    font_color = $font_color
    fade_on_empty = false
    rounding = -1
    check_color = $error_color
    fail_color = $error_color
    fail_transition = 300
    placeholder_text = <i><span>Input Password...</span></i>
    hide_input = false
    position = 0, -200
    halign = center
    valign = center 
}

label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  color = $entry_border_color
  font_size = 22
  font_family = JetBrains Mono
  position = 0, 300
  halign = center
  valign = center
}
# TIME
label {
  monitor = 
  text = cmd[update:1000] echo "$(date +"%-I:%M")"
  color = $text_color
  font_size = 95
  font_family = JetBrains Mono Extrabold
  position = 0, 200
  halign = center
  valign = center
}
label { # User
    monitor =
    text =   $USER 
    color = $entry_color 
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2 
    dots_center = true
    font_size = 20
    font_family = $font_symbols
    position = 0, 50
    halign = center
    valign = bottom
